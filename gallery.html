<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>An Anonymous Gallery</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@400;600&display=swap">
  <link rel="stylesheet" href="styles.css">
  <style>
    .gallery-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .gallery-title {
      margin: 0;
      font-size: 1.5rem;
    }
    .gallery-subtitle {
      text-align: center;
      margin: 0 0 1.5rem;
      opacity: 0.8;
    }

    .gallery-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin: 0 0 1rem;
    }

    .gallery-count {
      text-align: center;
      margin: 0 auto 1.8rem auto;
      opacity: 0.8;
    }

    .polaroid {
      background: #fff;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.4);
      max-width: 220px;
    }

    .polaroid-inner img {
      max-width: 100%;
      display: block;
      margin: 0 auto 0.5rem;
    }

    .polaroid-caption {
      font-size: 0.9rem;
      color: #333;
      margin: 0;
    }

    .cta-button {
      display: block;
      max-width: 400px;
      margin: 0 auto 2rem;
      padding: 1rem 1.5rem;
      font-size: 1.1rem;
      border: 2px solid #f5f5f5;
      border-radius: 8px;
      background: #111;
      color: #f5f5f5;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
    }

    .cta-button:hover {
      background: #222;
    }

    .no-submissions {
      text-align: center;
      color: #ccc;
      font-style: italic;
      margin: 2rem auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <img src="banner.png" alt="An Anonymous Gallery" class="banner">
    </header>

    <div class="gallery-header">
      <h2 class="gallery-title">An Anonymous Gallery</h2>
      <a href="index.html" class="cta-button">Submit your image</a>
    </div>

    <p class="gallery-subtitle">What it means to be human.</p>

    <div id="gallery" class="gallery-grid">
      <div class="no-submissions">No submissions yet. Be the first!</div>
    </div>

    <p id="galleryCount" class="gallery-count">…</p>

    <a href="index.html" class="cta-button">Submit your image</a>
  </div>

  <script>
  function loadGallery() {
    const gallery = document.getElementById('gallery');
    const countEl = document.getElementById('galleryCount');

    fetch('/.netlify/functions/submissions')
      .then(r => r.json())
      .then(submissions => {
        countEl.textContent = submissions.length + ' images so far.';

        if (submissions.length === 0) {
          gallery.innerHTML = '<p style="color:#ccc">No submissions yet.</p>';
          return;
        }

        gallery.innerHTML = '';
        submissions.forEach(sub => {
          const polaroid = document.createElement('div');
          polaroid.className = 'polaroid';
          polaroid.style.transform = `rotate(${Math.random()*4-2}deg)`;
          polaroid.innerHTML = `
            <div class="polaroid-inner">
              <img src="${sub.image}">
              <p class="polaroid-caption">${sub.comment}</p>
            </div>
          `;
          gallery.appendChild(polaroid);
        });
      });
  }

  loadGallery();
</script>

</body>
</html>
