<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Comment - An Anonymous Gallery</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@400;600&display=swap">
  <link rel="stylesheet" href="styles.css">
  <style>
    .your-preview {
      max-width: 100%;
      max-height: 300px;
      display: none;
      margin: 1rem auto;
      border-radius: 8px;
    }

    .comment-area {
      margin: 1rem 0 1.5rem;
    }

    button {
      margin: 0.5rem;
      padding: 12px 24px;
      font-size: 1rem;
    }

    textarea {
      width: 100%;
      height: 100px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <img src="banner.png" alt="An Anonymous Gallery" class="banner">
    </header>

    <h2>What this image says about being human</h2>

    <img id="yourImage" class="your-preview" alt="Your image">

    <div class="comment-area">
      <textarea id="commentText" maxlength="200" placeholder="What does this image say about being human?"></textarea>
    </div>

    <button onclick="submitEntry()">Submit anonymously</button>
    <button onclick="window.location.href='gallery.html'">Cancel</button>
  </div>

  <script>
  window.addEventListener('load', function() {
    const imageData = localStorage.getItem('tempImageData');
    const img = document.getElementById('yourImage');
    if (imageData && img) {
      img.src = imageData;
      img.style.display = 'block';
    }
  });

  function submitEntry() {
    const comment = document.getElementById('commentText').value.trim();
    const imageData = localStorage.getItem('tempImageData');

    if (!imageData) {
      alert('No image. Go back.');
      return;
    }

    fetch('/.netlify/functions/submissions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: imageData, comment })
    })
    .then(res => res.json())
    .then(data => {
      localStorage.removeItem('tempImageData');
      alert(`Submitted! ${data.count} images in gallery.`);
      window.location.href = 'gallery.html';
    })
    .catch(() => alert('Try again.'));
  }
</script>


</body>
</html>
