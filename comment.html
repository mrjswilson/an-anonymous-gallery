<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>An Anonymous Gallery – Caption</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <header class="site-header">
      <img src="banner.png" alt="An Anonymous Gallery" class="banner">
    </header>

    <main>
      <section id="step-2">
        <h2>Add a caption (optional)</h2>
        <p>You can share a few words about your image, or skip this step.</p>

        <textarea id="caption-input" rows="3" class="caption-input"></textarea>

        <div class="button-row">
          <button id="skip-caption-btn">Skip</button>
          <button id="submit-btn">Post</button>
        </div>
      </section>
    </main>
  </div>

  <script src="paste.js"></script>
</body>
</html>
