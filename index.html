<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>An Anonymous Gallery – Paste</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <header class="site-header">
      <img src="banner.png" alt="An Anonymous Gallery" class="banner">
    </header>

    <main>
      <section id="step-1">
  <h2>Post an original image of what it means to be human.</h2>
  <p>Choose a photo or image from your device.</p>

  <label class="file-label">
    <input type="file" id="file-input" accept="image/*" hidden>
    <span>Select or take a photo</span>
  </label>

  <div class="preview-wrapper">
    <img id="preview" class="preview" alt="Image preview">
  </div>

  <div class="button-row">
    <button id="redo-btn" disabled>Redo</button>
    <button id="next-btn" disabled>Next</button>
  </div>
</section>

    </main>
  </div>

  <script src="paste.js"></script>

</body>
</html>
