<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>An Anonymous Gallery – Paste</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <header class="site-header">
      <img src="banner.png" alt="An Anonymous Gallery" class="banner">
    </header>

    <main>
      <section id="step-1">
        <h2>Post an original image of what it means to be human.</h2>
        <p>Tap inside the box and press Ctrl+V / ⌘V (or long‑press → Paste on mobile).</p>

        <div id="paste-area" tabindex="0" class="paste-area">
          <p class="paste-hint">Paste your image here</p>
          <img id="preview" class="preview" />
        </div>

        <div class="button-row">
          <button id="redo-btn" disabled>Redo</button>
          <button id="next-btn" disabled>Next</button>
        </div>
      </section>
    </main>
  </div>

  <script src="paste.js"></script>
</body>
</html>
